name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: node scripts/validate.js

      - name: Generate OG images
        run: node scripts/generate-all-og-images.js

      - name: Build site
        run: npx @11ty/eleventy

      - name: Build search index
        run: node scripts/build-search-index.js

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOUDWAYS_SSH_PRIVATE_KEY }}

      - name: Deploy via rsync
        run: |
          ssh-keyscan -H ${{ secrets.CLOUDWAYS_SSH_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --delete _site/ ${{ secrets.CLOUDWAYS_SSH_USER }}@${{ secrets.CLOUDWAYS_SSH_HOST }}:${{ secrets.CLOUDWAYS_DEPLOY_PATH }}/

      - name: Purge Cloudways Varnish cache
        run: |
          TOKEN=$(curl -s -X POST "https://api.cloudways.com/api/v1/oauth/access_token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "email=${{ secrets.CLOUDWAYS_API_EMAIL }}&api_key=${{ secrets.CLOUDWAYS_API_KEY }}" \
            | jq -r '.access_token')
          curl -s -X POST "https://api.cloudways.com/api/v1/service/varnish" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "server_id=${{ secrets.CLOUDWAYS_SERVER_ID }}&action=purge"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
